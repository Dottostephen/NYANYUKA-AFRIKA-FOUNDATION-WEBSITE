<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Nyanyuka Afrika</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-white text-gray-900">

    <!-- NAVIGATION / MENU YA JUU -->
    <nav class="bg-white shadow-sm sticky top-0 z-50 border-b border-orange-100">
        <div class="max-w-7xl mx-auto px-6 h-24 flex items-center justify-between">
            
            <!-- SEHEMU YA LOGO INAPOFYONZWA -->
            <a href="index.html" class="flex items-center">
                <!-- Hapa picha yako ya logo.jpg inasomwa na kusafishwa -->
                <img src="logo.jpg" alt="Nyanyuka Afrika Foundation Logo" class="h-20 w-auto object-contain mix-blend-multiply">
            </a>

            <!-- VIUNGO VYA MENU -->
            <div class="hidden lg:flex items-center gap-6 text-[12px] font-bold uppercase text-gray-700">
                <a href="index.html" class="hover:text-orange-600 transition">Home</a>
                <a href="about.html" class="hover:text-orange-600 transition">About Us</a>
                <a href="management.html" class="hover:text-orange-600 transition">Management</a>
                <a href="projects.html" class="hover:text-orange-600 transition">Projects</a>
                <a href="contact.html" class="hover:text-orange-600 transition">Contact</a>
                <a href="donation.html" class="bg-orange-600 text-white px-5 py-2 rounded-full hover:bg-orange-700 transition">Donate</a>
            </div>
        </div>
    </nav>

    <!-- HEADER -->
    <header class="py-16 text-center">
        <h1 class="text-4xl font-black uppercase tracking-tight">Gallery</h1>
        <p class="text-gray-500 mt-2">Matukio yetu katika picha.</p>
    </header>

    <!-- GALLERY GRID -->
    <main class="max-w-6xl mx-auto px-6 pb-20">
        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
            <!-- Picha 1 -->
            <div class="aspect-square bg-gray-200 rounded-2xl overflow-hidden hover:opacity-90 transition">
                <img src="https://images.unsplash.com/photo-1542601906990-b4d3fb7784b9?auto=format&fit=crop&w=500&q=80" alt="Mazingira" class="w-full h-full object-cover">
            </div>
            <!-- Picha 2 -->
            <div class="aspect-square bg-gray-200 rounded-2xl overflow-hidden hover:opacity-90 transition">
                <img src="https://images.unsplash.com/photo-1594708767771-a7502209ff51?auto=format&fit=crop&w=500&q=80" alt="Uwezeshaji" class="w-full h-full object-cover">
            </div>
            <!-- Picha 3 -->
            <div class="aspect-square bg-gray-200 rounded-2xl overflow-hidden hover:opacity-90 transition">
                <img src="https://images.unsplash.com/photo-1523580494863-6f3031224c25?auto=format&fit=crop&w=500&q=80" alt="Timu" class="w-full h-full object-cover">
            </div>
            <!-- Picha 4 -->
            <div class="aspect-square bg-gray-200 rounded-2xl overflow-hidden hover:opacity-90 transition">
                <img src="https://images.unsplash.com/photo-1582213782179-e0d53f98f2ca?auto=format&fit=crop&w=500&q=80" alt="Msaada" class="w-full h-full object-cover">
            </div>
            <!-- Picha 5 -->
            <div class="aspect-square bg-gray-200 rounded-2xl overflow-hidden hover:opacity-90 transition">
                <img src="https://images.unsplash.com/photo-1469571486252-0a81b37e856e?auto=format&fit=crop&w=500&q=80" alt="Mazingira 2" class="w-full h-full object-cover">
            </div>
            <!-- Picha 6 -->
            <div class="aspect-square bg-gray-200 rounded-2xl overflow-hidden hover:opacity-90 transition">
                <img src="https://images.unsplash.com/photo-1521737711867-e3b97375f902?auto=format&fit=crop&w=500&q=80" alt="Mikutano" class="w-full h-full object-cover">
            </div>
        </div>
    </main>

    <footer class="py-10 bg-gray-50 text-center text-sm text-gray-500 border-t">
        &copy; 2026 Nyanyuka Afrika Foundation.
    </footer>

</body>
</html>
